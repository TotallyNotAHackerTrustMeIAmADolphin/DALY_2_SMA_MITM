; PlatformIO Project Configuration File
[env:lilygo-t-2can]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps = 
	jandrassy/TelnetStream @ ^1.2.5
	autowp/autowp-mcp2515@^1.3.1
	https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git

build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1

check_tool = cppcheck
check_flags =
  cppcheck: --enable=all --inline-suppr --suppress=unusedFunction

; comment out to use USB upload, don't forgett to press boot button
upload_protocol = espota
upload_port = 192.168.178.55
upload_flags = 
	--port=3232